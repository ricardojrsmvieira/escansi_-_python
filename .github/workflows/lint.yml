name: Lint

on: push


jobs:
  setup:
    name: Check uv.lock file and cache environment setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up the machine
        uses: ./.github/actions/setup

      - name: Check uv.lock file
        run: uv lock --check

      - name: Install and cache dependencies
        run: uv sync


  linter:
    name: Ruff Linter
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup the machine
        uses: ./.github/actions/setup

      - name: Run linter
        run: uv run --frozen ruff check


