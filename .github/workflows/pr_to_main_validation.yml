name: Pull Request to Main Validation

on:
  pull_request:
    branches:
      - main

jobs:
  validate_branch_name:
    name: Validate branch versioning name
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name
        run: |
          if [[ ! "${{ github.head_ref }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Branch name must start with 'v' followed by a semantic version (e.g., v1.2.3)."
            exit 1
          fi