name: Publish to Test PyPI

on: workflow_dispatch

concurrency:
  group: test_pypi_publish
  cancel-in-progress: true

jobs:
  build_and_publish:
    name: Build and publish 📦
    permissions:
      id-token: write
      attestations: write
      artifact-metadata: write
    uses: ./.github/workflows/build_and_publish.yml
    with:
      test: true
