name: Setup Machine 📦

inputs:
  persist-credentials:
    required: false
    type: boolean
    default: false

runs:
  using: composite
  steps:
    # README/TODO: When you publish this action, uncomment this and remove checking from other actions/workflows.
    # - name: Checkout repository
    #   uses: actions/checkout@v6
    #   with:
    #     persist-credentials: ${{ inputs.persist-credentials }}

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
          python-version-file: ".python-version"

    - name: Install uv
      uses: astral-sh/setup-uv@v8.3.2
      with:
        enable-cache: true
