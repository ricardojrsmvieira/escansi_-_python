line-length = 100

[lint]
select = ["ALL"]
ignore = [
  # START: Conflicting lint rules with formatter. See https://docs.astral.sh/ruff/formatter/#conflicting-lint-rules
  # 'W191', # 'tab-indentation',
  # 'E111', # 'indentation-with-invalid-multiple',
  # 'E114', # 'indentation-with-invalid-multiple-comment',
  # 'E117', # 'over-indented',
  'D203', # 'incorrect-blank-line-before-class',
  # 'D206', # 'docstring-tab-indentation',
  # 'D300', # 'triple-single-quotes',
  'Q000', # 'bad-quotes-inline-string',
  # 'Q001', # 'bad-quotes-multiline-string',
  # 'Q002', # 'bad-quotes-docstring',
  'Q003', # 'avoidable-escaped-quote',
  # 'Q004', # 'unnecessary-escaped-quote',
  'COM812', # 'missing-trailing-comma',
  # 'COM819', # 'prohibited-trailing-comma',
  # 'ISC002', # 'multi-line-implicit-string-concatenation',

  # Not present on documentation but still conflicting with the formatter:
  'D212', # 'multi-line-summary-first-line',
  # 'D213', # 'multi-line-summary-second-line'
  # END:   Conflicting lint rules with formatter. See https://docs.astral.sh/ruff/formatter/#conflicting-lint-rules
]


[lint.isort]
combine-as-imports = true
force-wrap-aliases = true
lines-after-imports = 2

[lint.isort.import-heading]
future = "---> Future imports <--- #"
standard-library = "---> Standard library imports <--- #"
third-party = "---> Third party imports <--- #"
first-party = "---> First party imports <--- #"
local-folder = "---> Local imports <--- #"


[format]
quote-style = "single"
